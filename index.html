<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>José — Dr's Choice</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde-oscuro: #1B3A2D;
      --verde-medio: #2E6B4F;
      --verde-claro: #4A9B6F;
      --verde-suave: #E8F2EC;
      --crema: #F7F4EF;
      --texto: #1a1a1a;
      --gris: #6B7280;
      --blanco: #ffffff;
      --sombra: 0 2px 20px rgba(27,58,45,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--crema);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      background: var(--verde-oscuro);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid var(--verde-claro);
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .header-info h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      color: white;
      font-weight: 400;
      line-height: 1.2;
    }

    .header-info p {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      font-weight: 300;
      letter-spacing: 0.3px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 6px #4ade80;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Chat área */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: rgba(27,58,45,0.2); border-radius: 2px; }

    .msg {
      max-width: 82%;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.jose {
      align-self: flex-start;
    }

    .msg.user {
      align-self: flex-end;
    }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      font-weight: 400;
    }

    .msg.jose .bubble {
      background: var(--blanco);
      color: var(--texto);
      border-radius: 4px 18px 18px 18px;
      box-shadow: var(--sombra);
    }

    .msg.user .bubble {
      background: var(--verde-oscuro);
      color: white;
      border-radius: 18px 18px 4px 18px;
    }

    .msg-meta {
      font-size: 10px;
      color: var(--gris);
      margin-top: 4px;
      padding: 0 4px;
    }

    .msg.user .msg-meta {
      text-align: right;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 5px;
      padding: 14px 16px;
      background: var(--blanco);
      border-radius: 4px 18px 18px 18px;
      width: fit-content;
      box-shadow: var(--sombra);
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: var(--verde-claro);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input área */
    .input-area {
      padding: 12px 16px 16px;
      background: var(--blanco);
      border-top: 1px solid rgba(27,58,45,0.08);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--verde-suave);
      border-radius: 24px;
      padding: 8px 8px 8px 16px;
      border: 1.5px solid transparent;
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--verde-claro);
    }

    #input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--texto);
      resize: none;
      outline: none;
      max-height: 100px;
      line-height: 1.5;
      padding: 2px 0;
    }

    #input::placeholder { color: var(--gris); }

    #send {
      width: 36px;
      height: 36px;
      background: var(--verde-oscuro);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    #send:hover { background: var(--verde-medio); }
    #send:active { transform: scale(0.93); }

    #send svg { width: 16px; height: 16px; fill: white; }

    .footer-note {
      text-align: center;
      font-size: 10px;
      color: var(--gris);
      margin-top: 8px;
      letter-spacing: 0.2px;
    }

    /* Bienvenida */
    .welcome {
      text-align: center;
      padding: 24px 16px 8px;
      animation: fadeUp 0.4s ease;
    }

    .welcome-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 13px;
      color: var(--gris);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .welcome h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--verde-oscuro);
      font-weight: 400;
      margin-bottom: 6px;
    }

    .welcome p {
      font-size: 13px;
      color: var(--gris);
      line-height: 1.5;
      max-width: 260px;
      margin: 0 auto;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--verde-claro);
      margin: 12px auto;
      opacity: 0.4;
    }
  </style>
</head>
<body>

<header>
  <div class="avatar"><img src="https://raw.githubusercontent.com/Optimiza-Git/DrsChoice/main/jose.png" alt="José"></div>
  <div class="header-info">
    <h1>José</h1>
    <p>Asistente virtual · Dr's Choice</p>
  </div>
  <div class="status-dot"></div>
</header>

<div id="chat">
  <div class="msg jose">
    <div class="bubble">Hola 👋 Soy José de Dr's Choice. Estoy aquí para ayudarte a encontrar soluciones tecnológicas para salud, rehabilitación y bienestar.<br><br>¿Con qué especialidad trabajas?</div>
    <div class="msg-meta">José · ahora</div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Escribe tu consulta aquí..." maxlength="1000"></textarea>
    <button id="send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="footer-note">Dr's Choice — Nos mueve tu bienestar © 2026 · powered by © Wirkun</div>
</div>

<script>
  const BACKEND_URL = "web-production-1ee67.up.railway.app";

  const chat    = document.getElementById("chat");
  const input   = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const history = [];

  function timestamp() {
    return new Date().toLocaleTimeString("es-CL", { hour: "2-digit", minute: "2-digit" });
  }

  function addMsg(text, role) {
    const div  = document.createElement("div");
    div.className = `msg ${role}`;
    const time = timestamp();
    div.innerHTML = `
      <div class="bubble">${text.replace(/\n/g, "<br>").replace(/\*(.*?)\*/g, "<strong>$1</strong>")}</div>
      <div class="msg-meta">${role === "jose" ? "José" : "Tú"} · ${time}</div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "msg jose";
    div.id = "typing";
    div.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    history.push({ role: "user", content: text });
    input.value = "";
    input.style.height = "auto";
    sendBtn.disabled = true;
    showTyping();

    try {
      const res  = await fetch(`${BACKEND_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      const reply = data.reply || "Lo siento, hubo un error. Intenta de nuevo.";
      removeTyping();
      addMsg(reply, "jose");
      history.push({ role: "assistant", content: reply });
    } catch (e) {
      removeTyping();
      addMsg("Lo siento, no pude conectarme. Intenta de nuevo o escríbenos al +56 9 6159 8525 💬", "jose");
    }

    sendBtn.disabled = false;
    input.focus();
  }

  sendBtn.addEventListener("click", send);

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 100) + "px";
  });
</script>
</body>
</html>
