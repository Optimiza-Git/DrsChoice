<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr's Choice — Asistente Virtual</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f5f3ef;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.chat-header{background:#1a2e1a;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.logo-mark{width:38px;height:38px;background:#4a8c4a;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:17px;color:#fff;flex-shrink:0;letter-spacing:-1px}
.header-info{flex:1}
.header-info .name{font-size:15px;font-weight:600;color:#e8f0e8;font-family:'Playfair Display',serif}
.header-info .subtitle{font-size:11.5px;color:#7baa7b;margin-top:1px}
.status-dot{width:8px;height:8px;background:#4ade80;border-radius:50%;flex-shrink:0;animation:pulse-dot 2.5s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 2px rgba(74,222,128,0.25)}50%{box-shadow:0 0 0 5px rgba(74,222,128,0.1)}}
.messages-area{flex:1;overflow-y:auto;padding:20px 16px 12px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.messages-area::-webkit-scrollbar{width:4px}
.messages-area::-webkit-scrollbar-thumb{background:#c5c0b6;border-radius:4px}
.msg{display:flex;gap:8px;align-items:flex-end;max-width:100%}
.msg.user{flex-direction:row-reverse}
.avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.avatar.bot{background:#1a2e1a;color:#7baa7b;font-family:'Playfair Display',serif;font-size:13px;border:1.5px solid #2d4a2d}
.avatar.user-av{background:#d4e8d4;color:#1a4a1a;font-size:11px}
.bubble{max-width:78%;padding:11px 15px;border-radius:16px;font-size:14px;line-height:1.6;word-wrap:break-word}
.bubble.bot{background:#fff;color:#1c2b1c;border-radius:4px 16px 16px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.07);border:0.5px solid #ddd9d3}
.bubble.user{background:#1a2e1a;color:#e8f0e8;border-radius:16px 4px 16px 16px}
.quick-replies{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.qr-chip{background:#f0f7f0;border:1px solid #b4d4b4;color:#1a4a1a;padding:6px 13px;border-radius:20px;font-size:12.5px;cursor:pointer;transition:all 0.18s ease;font-family:'DM Sans',sans-serif;font-weight:500}
.qr-chip:hover{background:#1a2e1a;color:#e8f0e8;border-color:#1a2e1a;transform:translateY(-1px)}
.typing-bubble{display:flex;gap:5px;padding:13px 16px;background:#fff;border-radius:4px 16px 16px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.07);border:0.5px solid #ddd9d3;width:fit-content}
.typing-bubble span{width:7px;height:7px;background:#4a8c4a;border-radius:50%;animation:typing-bounce 1.2s ease-in-out infinite}
.typing-bubble span:nth-child(2){animation-delay:0.2s}
.typing-bubble span:nth-child(3){animation-delay:0.4s}
@keyframes typing-bounce{0%,80%,100%{transform:translateY(0);opacity:0.5}40%{transform:translateY(-5px);opacity:1}}
.input-area{background:#fff;border-top:1px solid #e0dbd3;padding:12px 14px;flex-shrink:0}
.input-row{display:flex;gap:9px;align-items:flex-end;background:#f5f3ef;border:1.5px solid #d4cfc8;border-radius:24px;padding:8px 8px 8px 16px;transition:border-color 0.2s}
.input-row:focus-within{border-color:#4a8c4a}
textarea#msgInput{flex:1;border:none;background:transparent;resize:none;font-family:'DM Sans',sans-serif;font-size:14px;color:#1c2b1c;outline:none;min-height:22px;max-height:120px;overflow-y:auto;line-height:1.5;padding:0}
textarea#msgInput::placeholder{color:#a09890}
.send-btn{width:36px;height:36px;background:#1a2e1a;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.18s,transform 0.1s}
.send-btn:hover{background:#2d4a2d}
.send-btn:active{transform:scale(0.93)}
.send-btn svg{width:17px;height:17px;fill:none;stroke:#e8f0e8;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.input-footer{text-align:center;font-size:10.5px;color:#b0a898;margin-top:7px}
.lead-form{background:#f0f7f0;border:1px solid #b4d4b4;border-radius:14px;padding:14px 16px;margin-top:10px;display:flex;flex-direction:column;gap:9px}
.lead-form .form-title{font-size:13px;font-weight:600;color:#1a3a1a}
.lead-form input{border:1px solid #c4d8c4;border-radius:8px;padding:8px 11px;font-family:'DM Sans',sans-serif;font-size:13px;color:#1c2b1c;background:#fff;outline:none;width:100%}
.lead-form input:focus{border-color:#4a8c4a}
.lead-form .submit-btn{background:#1a2e1a;color:#e8f0e8;border:none;border-radius:8px;padding:9px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.18s}
.lead-form .submit-btn:hover{background:#2d4a2d}
</style>
</head>
<body>
<div class="chat-header">
  <div class="logo-mark">DC</div>
  <div class="header-info">
    <div class="name">Dr's Choice</div>
    <div class="subtitle">Asistente virtual · Tecnología médica</div>
  </div>
  <div class="status-dot"></div>
</div>
<div class="messages-area" id="msgs"></div>
<div class="input-area">
  <div class="input-row">
    <textarea id="msgInput" rows="1" placeholder="Escribe tu consulta aquí..." maxlength="600"></textarea>
    <button class="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="input-footer">Dr's Choice © 2026 · Powered by IA</div>
</div>
<script>
const BACKEND_URL = 'https://web-production-90950.up.railway.app';

const conversationHistory = [];
let leadCaptureMode = false;
let leadData = {};
let isThinking = false;

function appendMsg(role, content, extras={}) {
  const area = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = `avatar ${role==='bot'?'bot':'user-av'}`;
  av.textContent = role==='bot'?'DC':'Tú';
  const bub = document.createElement('div');
  bub.className = `bubble ${role}`;
  if (typeof content === 'string') {
    bub.innerHTML = content.replace(/\n/g,'<br>').replace(/\*(.*?)\*/g,'<strong>$1</strong>').replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" style="color:#2d7a2d;text-decoration:underline;">$1</a>');
  } else { bub.appendChild(content); }
  if (extras.quickReplies && extras.quickReplies.length > 0) {
    const qr = document.createElement('div');
    qr.className = 'quick-replies';
    extras.quickReplies.forEach(text => {
      const chip = document.createElement('button');
      chip.className = 'qr-chip';
      chip.textContent = text;
      chip.onclick = () => { qr.remove(); sendMessage(text); };
      qr.appendChild(chip);
    });
    bub.appendChild(qr);
  }
  wrap.appendChild(av);
  wrap.appendChild(bub);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
  return bub;
}

function showTyping() {
  const area = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing-indicator';
  const av = document.createElement('div');
  av.className = 'avatar bot';
  av.textContent = 'DC';
  const tb = document.createElement('div');
  tb.className = 'typing-bubble';
  tb.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(av);
  wrap.appendChild(tb);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function callBackend(userMsg) {
  conversationHistory.push({role:'user', content:userMsg});
  const res = await fetch(`${BACKEND_URL}/chat`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({messages: conversationHistory})
  });
  const data = await res.json();
  const reply = data.reply || 'Lo siento, hubo un problema. Escríbenos al +56 9 6159 8525';
  conversationHistory.push({role:'assistant', content:reply});
  return reply;
}

function detectLeadIntent(text) {
  return ['cotiz','precio','comprar','adquirir','visita','demostr','presupuesto','proyecto','interesa'].some(k=>text.toLowerCase().includes(k));
}

function detectQRs(reply) {
  const low = reply.toLowerCase();
  if (low.includes('active') && low.includes('recovery')) return ['Área Active','Área Recovery','Área Performance','Servicios'];
  if (low.includes('cotiz')||low.includes('ejecutivo')) return ['Enviar mis datos','Otra consulta'];
  if (low.includes('reparac')||low.includes('servicio')) return ['Reparaciones','Mantenciones','Capacitaciones'];
  return [];
}

async function sendMessage(text) {
  if (!text.trim()||isThinking) return;
  isThinking = true;
  const input = document.getElementById('msgInput');
  input.value = '';
  input.style.height = 'auto';
  appendMsg('user', text);
  showTyping();
  try {
    const reply = await callBackend(text);
    hideTyping();
    if (detectLeadIntent(text)||detectLeadIntent(reply)) {
      appendMsg('bot', reply);
      setTimeout(()=>showLeadCapture(), 400);
    } else {
      appendMsg('bot', reply, {quickReplies: detectQRs(reply)});
    }
  } catch(e) {
    hideTyping();
    appendMsg('bot','Hubo un problema de conexión. Escríbenos al +56 9 6159 8525 💬');
  }
  isThinking = false;
}

function showLeadCapture() {
  const area = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  const av = document.createElement('div');
  av.className = 'avatar bot';
  av.textContent = 'DC';
  const bub = document.createElement('div');
  bub.className = 'bubble bot';
  const form = document.createElement('div');
  form.className = 'lead-form';
  form.innerHTML = `<div class="form-title">📋 Para conectarte con un ejecutivo</div><input type="text" id="lf-name" placeholder="Tu nombre"/><input type="text" id="lf-inst" placeholder="Institución / empresa"/><input type="tel" id="lf-tel" placeholder="Teléfono o WhatsApp"/><button class="submit-btn" onclick="submitLead()">Enviar datos →</button>`;
  bub.appendChild(form);
  wrap.appendChild(av);
  wrap.appendChild(bub);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

function submitLead() {
  const name = document.getElementById('lf-name').value.trim();
  const tel = document.getElementById('lf-tel').value.trim();
  if (!name||!tel) { alert('Por favor completa al menos tu nombre y teléfono.'); return; }
  appendMsg('bot',`Perfecto ${name} 🙌 Un ejecutivo de Dr's Choice se pondrá en contacto contigo a la brevedad al ${tel}.\n\nPuedes explorar nuestro catálogo en https://drchoice.cl`,{quickReplies:['Ver más productos','Otra consulta']});
}

function handleSend() {
  sendMessage(document.getElementById('msgInput').value.trim());
}

document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); handleSend(); }
});

document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight,120)+'px';
});

window.addEventListener('load', () => {
  setTimeout(() => {
    appendMsg('bot','¡Hola! 👋 Soy el asistente virtual de Dr\'s Choice, empresa especializada en tecnología médica con más de 34 años de experiencia.\n\n¿En qué puedo ayudarte hoy?',{quickReplies:['Productos de Rehabilitación','Equipos para Adultos Mayores','Rendimiento Deportivo','Servicios técnicos','Solicitar cotización']});
  }, 600);
});
</script>
</body>
</html>
